<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Personality · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --grow: #B9A7F2;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(185,167,242,0.14), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }
.dash-title {
  margin: 0 0 14px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

.gm-card {
  position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px;
  margin-bottom: 14px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45); overflow: hidden;
}
.gm-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.gm-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }

.gm-streak {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: var(--text-tertiary);
  font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase;
}
.gm-streak.gm-streak-set { background: rgba(185,167,242,0.12); border-color: rgba(185,167,242,0.35); color: #E3DAFB; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
.stat { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
.stat-num { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; color: var(--text-primary); line-height: 1; }
.stat-label { margin-top: 6px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }

.gm-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.gm-field label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); }
.gm-row-fields { display: flex; gap: 10px; flex-wrap: wrap; }
.gm-row-fields > .gm-field { flex: 1; min-width: 140px; }

.gm-input, .gm-select {
  padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px;
  outline: none; transition: border-color 0.2s, background 0.2s; width: 100%;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus, .gm-select:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.gm-select { appearance: none; -webkit-appearance: none; cursor: pointer; }

.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }

.gm-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
}
.gm-row:hover { background: rgba(255,255,255,0.06); }
.gm-row.gm-row-done { opacity: 0.45; background: rgba(107,227,164,0.04); }
.gm-row.gm-row-done .gm-text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4); }

.gm-check {
  appearance: none; -webkit-appearance: none; width: 22px; height: 22px; flex-shrink: 0; margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); border-radius: 7px;
  position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked { background: var(--success); border-color: var(--success); box-shadow: 0 0 12px rgba(107,227,164,0.40); }
.gm-check:checked::after {
  content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px;
  border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
}
.gm-text { flex: 1; font-size: 14px; color: var(--text-primary); outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.gm-text[contenteditable="true"] { outline: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); }

.session-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.session-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.session-title { font-size: 14px; color: var(--text-primary); font-weight: 600; }
.session-meta { font-size: 11.5px; color: var(--text-tertiary); font-family: var(--font-mono); }
.session-notes { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.goal-delete {
  border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer;
  padding: 0 4px; opacity: 0.5; transition: opacity 0.2s, color 0.2s; flex-shrink: 0;
}
.gm-row:hover .goal-delete { opacity: 1; }
.goal-delete:hover { color: var(--danger); }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Personality</h1>

  <!-- ===== Who you're becoming ===== -->
  <div class="section">
    <div class="section-title">Who You're Becoming</div>
    <div class="gm-card">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow">Direction, not perfection</div>
          <div class="gm-sub">Pick a couple of traits to work on at a time — small, consistent reps beat a total personality overhaul.</div>
        </div>
        <span class="gm-streak" id="persProfilePill">No focus set</span>
      </div>

      <div class="gm-field">
        <label for="persFocus">What you're working on</label>
        <input class="gm-input" id="persFocus" type="text" placeholder="e.g. confidence, follow-through, listening more than talking">
      </div>

      <div class="gm-field">
        <label for="persNotes">Notes</label>
        <input class="gm-input" id="persNotes" type="text" placeholder="Why this, why now?">
      </div>

      <div class="gm-input-wrap" style="border-top:0; padding-top:0; margin-top:0;">
        <button class="gm-add" id="persProfileSave" type="button">Save</button>
      </div>
    </div>
  </div>

  <!-- ===== Growth checklist ===== -->
  <div class="section">
    <div class="section-title">Growth Checklist</div>
    <div class="gm-card">
      <ul class="goal-list" id="persGoalList"></ul>

      <div class="gm-input-wrap">
        <input class="gm-input" id="persGoalInput" type="text" placeholder="Add something to work on…" autocomplete="off">
        <button class="gm-add" id="persGoalAdd" type="button">Add</button>
      </div>
    </div>
  </div>

  <!-- ===== Reflection log ===== -->
  <div class="section">
    <div class="section-title">Reflection Log</div>
    <div class="gm-card">
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="persWeekCount">0</div><div class="stat-label">This week</div></div>
        <div class="stat"><div class="stat-num" id="persAvgRating">—</div><div class="stat-label">Avg rating</div></div>
        <div class="stat"><div class="stat-num" id="persTotalCount">0</div><div class="stat-label">All time</div></div>
      </div>

      <ul class="goal-list" id="persLogList" style="margin-top:14px;"></ul>

      <div class="gm-input-wrap">
        <div class="gm-row-fields" style="width:100%; margin-bottom:0;">
          <div class="gm-field">
            <label for="persLogDate">Date</label>
            <input class="gm-input" id="persLogDate" type="date">
          </div>
          <div class="gm-field">
            <label for="persLogCategory">Area</label>
            <select class="gm-select" id="persLogCategory">
              <option value="confidence">Confidence</option>
              <option value="social">Social</option>
              <option value="discipline">Discipline</option>
              <option value="mindset">Mindset</option>
              <option value="growth">Growth</option>
            </select>
          </div>
          <div class="gm-field">
            <label for="persLogRating">Rating (1–10)</label>
            <input class="gm-input" id="persLogRating" type="number" min="1" max="10" placeholder="7">
          </div>
        </div>
        <div class="gm-field" style="width:100%;">
          <label for="persLogNotes">What happened?</label>
          <input class="gm-input" id="persLogNotes" type="text" placeholder="e.g. spoke up in the meeting instead of staying quiet">
        </div>
        <button class="gm-add" id="persLogAdd" type="button">Add entry</button>
      </div>
    </div>
  </div>

</div><!-- /.page -->

<script>
(function () {
  'use strict';

  const PROFILE_KEY = 'pers:profile';
  const GOALS_KEY = 'pers:goals';
  const LOG_KEY = 'pers:log';

  const STARTER_GOALS = [
    'Practice eye contact in conversations',
    'Speak up once in every meeting or group setting',
    'Journal for 5 minutes a day',
    'Read for 20 minutes a day',
    'Set one boundary this week',
    'Give someone a genuine compliment',
    'Sit with discomfort instead of reaching for your phone',
    'Reflect on one mistake without self-judgment',
  ];

  const CATEGORY_META = {
    confidence: { icon: '🦁', label: 'Confidence' },
    social:     { icon: '🗣️', label: 'Social' },
    discipline: { icon: '🧱', label: 'Discipline' },
    mindset:    { icon: '🧠', label: 'Mindset' },
    growth:     { icon: '🌱', label: 'Growth' },
  };

  function load(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
    catch (e) { return fallback; }
  }
  function save(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function fmtDate(s) {
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }
  function startOfWeek(d) {
    const x = new Date(d); x.setHours(0, 0, 0, 0);
    const day = (x.getDay() + 6) % 7;
    x.setDate(x.getDate() - day);
    return x;
  }

  // ---- Profile ----
  const focusEl = document.getElementById('persFocus');
  const notesEl = document.getElementById('persNotes');
  const pillEl = document.getElementById('persProfilePill');
  const profileSaveBtn = document.getElementById('persProfileSave');

  function renderProfile() {
    const p = load(PROFILE_KEY, {});
    focusEl.value = p.focus || '';
    notesEl.value = p.notes || '';
    if (p.focus) {
      pillEl.textContent = p.focus;
      pillEl.classList.add('gm-streak-set');
    } else {
      pillEl.textContent = 'No focus set';
      pillEl.classList.remove('gm-streak-set');
    }
  }
  profileSaveBtn.addEventListener('click', function () {
    save(PROFILE_KEY, { focus: focusEl.value.trim(), notes: notesEl.value.trim() });
    renderProfile();
  });

  // ---- Growth checklist ----
  const goalListEl = document.getElementById('persGoalList');
  const goalInputEl = document.getElementById('persGoalInput');
  const goalAddBtn = document.getElementById('persGoalAdd');

  function ensureGoalsSeeded() {
    if (localStorage.getItem(GOALS_KEY) == null) {
      save(GOALS_KEY, STARTER_GOALS.map(function (text) { return { text: text, done: false }; }));
    }
  }

  function renderGoals() {
    const items = load(GOALS_KEY, []);
    goalListEl.innerHTML = '';
    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.textContent = 'Nothing here yet — add the first thing you want to work on.';
      goalListEl.appendChild(li);
      return;
    }
    items.forEach(function (item, i) {
      const li = document.createElement('li');
      li.className = 'gm-row' + (item.done ? ' gm-row-done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'gm-check';
      cb.checked = !!item.done;
      cb.addEventListener('change', function () {
        const list = load(GOALS_KEY, []); list[i].done = cb.checked; save(GOALS_KEY, list); renderGoals();
      });

      const txt = document.createElement('div');
      txt.className = 'gm-text';
      txt.textContent = item.text;
      txt.contentEditable = 'true';
      txt.addEventListener('blur', function () {
        const list = load(GOALS_KEY, []); list[i].text = txt.textContent.trim(); save(GOALS_KEY, list);
      });
      txt.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); txt.blur(); } });

      const del = document.createElement('button');
      del.className = 'goal-delete';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', function () {
        const list = load(GOALS_KEY, []); list.splice(i, 1); save(GOALS_KEY, list); renderGoals();
      });

      li.append(cb, txt, del);
      goalListEl.appendChild(li);
    });
  }

  function addGoal() {
    const text = goalInputEl.value.trim();
    if (!text) return;
    const list = load(GOALS_KEY, []);
    list.push({ text: text, done: false });
    save(GOALS_KEY, list);
    goalInputEl.value = '';
    renderGoals();
  }
  goalAddBtn.addEventListener('click', addGoal);
  goalInputEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') addGoal(); });

  // ---- Reflection log ----
  const logListEl = document.getElementById('persLogList');
  const logDateEl = document.getElementById('persLogDate');
  const logCategoryEl = document.getElementById('persLogCategory');
  const logRatingEl = document.getElementById('persLogRating');
  const logNotesEl = document.getElementById('persLogNotes');
  const logAddBtn = document.getElementById('persLogAdd');
  logDateEl.value = todayStr();

  function renderLog() {
    const entries = load(LOG_KEY, [])
      .slice()
      .sort(function (a, b) { return (b.date || '').localeCompare(a.date || '') || (b.id || 0) - (a.id || 0); });

    const weekStart = startOfWeek(new Date());
    let weekCount = 0, ratingSum = 0, ratingCount = 0;
    entries.forEach(function (e) {
      const ed = new Date(e.date + 'T00:00:00');
      if (ed >= weekStart) weekCount++;
      if (e.rating) { ratingSum += Number(e.rating); ratingCount++; }
    });

    document.getElementById('persWeekCount').textContent = weekCount;
    document.getElementById('persTotalCount').textContent = entries.length;
    document.getElementById('persAvgRating').textContent = ratingCount ? (Math.round((ratingSum / ratingCount) * 10) / 10) : '—';

    logListEl.innerHTML = '';
    if (entries.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.textContent = 'No entries yet — log how today went below.';
      logListEl.appendChild(li);
      return;
    }

    entries.forEach(function (e) {
      const meta = CATEGORY_META[e.category] || CATEGORY_META.growth;
      const li = document.createElement('li');
      li.className = 'gm-row';

      const icon = document.createElement('div');
      icon.className = 'session-icon';
      icon.textContent = meta.icon;

      const main = document.createElement('div');
      main.className = 'session-main';

      const title = document.createElement('div');
      title.className = 'session-title';
      title.textContent = meta.label;

      const metaLine = document.createElement('div');
      metaLine.className = 'session-meta';
      const parts = [fmtDate(e.date)];
      if (e.rating) parts.push(e.rating + '/10');
      metaLine.textContent = parts.join(' · ');

      main.append(title, metaLine);
      if (e.notes) {
        const notes = document.createElement('div');
        notes.className = 'session-notes';
        notes.textContent = e.notes;
        main.appendChild(notes);
      }

      const del = document.createElement('button');
      del.className = 'goal-delete';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', function () {
        const list = load(LOG_KEY, []).filter(function (x) { return x.id !== e.id; });
        save(LOG_KEY, list);
        renderLog();
      });

      li.append(icon, main, del);
      logListEl.appendChild(li);
    });
  }

  logAddBtn.addEventListener('click', function () {
    const notes = logNotesEl.value.trim();
    const rating = Number(logRatingEl.value) || 0;
    if (!notes && !rating) return;
    const list = load(LOG_KEY, []);
    list.push({
      id: Date.now(),
      date: logDateEl.value || todayStr(),
      category: logCategoryEl.value,
      rating: rating,
      notes: notes,
    });
    save(LOG_KEY, list);
    logRatingEl.value = '';
    logNotesEl.value = '';
    renderLog();
  });

  // ---- init ----
  ensureGoalsSeeded();
  renderProfile();
  renderGoals();
  renderLog();

  if (window.initCloudSync) {
    window.initCloudSync({
      appKey: 'personality',
      syncedKeys: [PROFILE_KEY, GOALS_KEY, LOG_KEY],
      onApplied: function () { renderProfile(); renderGoals(); renderLog(); },
    });
  }
})();
</script>
</body>
</html>
